<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════
         SEO — Primary Meta
    ═══════════════════════════════════════════ -->
    <title>NexusFlow — Agency Workflow Automation &amp; PM</title>
    <meta name="description"
      content="Automate your agency's creative projects end-to-end. NexusFlow streamlines workflow automation, creative project management, and client delivery." />
    <meta name="keywords"
      content="agency workflow automation, creative project management, AI project management, agency tools, client workflow, brief to invoice" />
    <link rel="canonical" href="https://nexusflow.io/" />

    <!-- ═══════════════════════════════════════════
         OpenGraph — LinkedIn / Facebook
    ═══════════════════════════════════════════ -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://nexusflow.io/" />
    <meta property="og:site_name"    content="NexusFlow" />
    <meta property="og:locale"       content="en_US" />
    <meta property="og:title"
      content="NexusFlow — Agency Workflow Automation" />
    <meta property="og:description"
      content="From brief to invoice, fully automated. The creative project management platform built for agencies that need to scale without the chaos." />
    <meta property="og:image"        content="https://nexusflow.io/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"
      content="NexusFlow dashboard UI on a dark navy background showing automated workflow steps from client intake to invoice generation, with a blue glow accent" />

    <!-- ═══════════════════════════════════════════
         Twitter Card
    ═══════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@nexusflow" />
    <meta name="twitter:title"
      content="NexusFlow — Agency Workflow Automation" />
    <meta name="twitter:description"
      content="From brief to invoice, fully automated. Built for creative agencies." />
    <meta name="twitter:image"       content="https://nexusflow.io/og-image.png" />
    <meta name="twitter:image:alt"
      content="NexusFlow dashboard UI on a dark navy background showing automated workflow steps from client intake to invoice generation, with a blue glow accent" />

    <!-- ═══════════════════════════════════════════
         Fonts
    ═══════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
